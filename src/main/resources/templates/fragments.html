<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

    <div th:fragment="header">
        
        <style>
            .dropdown {
                position: relative;
                display: inline-block;
            }
            .dropbtn {
                background-color: #34495e;
                color: white;
                padding: 10px 20px;
                font-size: 16px;
                border: 2px solid #ecf0f1;
                border-radius: 8px;
                cursor: pointer;
                font-weight: bold;
                transition: background-color 0.3s;
            }
            /* The hidden menu container */
            .dropdown-content {
                display: none;
                position: absolute;
                right: 0; /* Aligns the menu to the right edge of the button */
                background-color: white;
                min-width: 220px;
                box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
                z-index: 1000;
                border-radius: 8px;
                overflow: hidden;
                margin-top: 5px;
            }
            /* The links inside the menu */
            .dropdown-content a, .dropdown-content button {
                color: #2c3e50;
                padding: 15px 20px;
                text-decoration: none;
                display: block;
                width: 100%;
                text-align: left;
                background: none;
                border: none;
                font-size: 16px;
                font-family: inherit;
                cursor: pointer;
                border-bottom: 1px solid #eee;
            }
            .dropdown-content form {
                margin: 0; /* Removes default form margins */
            }
            /* Hover effects for the items */
            .dropdown-content a:hover, .dropdown-content button:hover {
                background-color: #f1f8e9;
                color: #27ae60;
            }
            /* Show the menu when hovering over the parent dropdown div */
            .dropdown:hover .dropdown-content {
                display: block;
            }
            .dropdown:hover .dropbtn {
                background-color: #2c3e50;
            }
        </style>

        <div style="background-color: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px;">
            
            <h2 style="margin: 0;">📘 LinguaVault</h2>
            
            <div class="dropdown">
                <button class="dropbtn">👤 My Profile ▾</button>
                
                <div class="dropdown-content">
                    <a href="/decks">🏠 Dashboard</a>
                    <a href="/favorites">⭐ Favorites</a>
                    <a href="/practice">🔴 Needs Practice</a>
                    
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" style="color: #e74c3c; font-weight: bold;">🚪 Logout</button>
                    </form>
                </div>
            </div>
            
        </div>
    </div>


    <div th:fragment="footer" style="text-align: center; padding: 20px; margin-top: 50px; border-top: 2px solid #ecf0f1; color: #7f8c8d; font-size: 14px;">
        <p>&copy; 2026 LinguaVault | Built for Grade 5</p>
    </div>

</body>
</html>
