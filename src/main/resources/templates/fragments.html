<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

    <div th:fragment="header" style="background-color: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px;">
        
        <h2 style="margin: 0;">📘 LinguaVault</h2>
        
        <nav>
            <a href="/decks" style="color: white; text-decoration: none; font-weight: bold; margin-right: 20px;">🏠 Dashboard</a>
            
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" style="background-color: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">Logout</button>
            </form>
        </nav>
    </div>


    <div th:fragment="footer" style="text-align: center; padding: 20px; margin-top: 50px; border-top: 2px solid #ecf0f1; color: #7f8c8d; font-size: 14px;">
        <p>&copy; 2026 LinguaVault | Built for Grade 5</p>
    </div>

</body>
</html>
