
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CourierTrack Dashboard</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>My Delivery Shifts</h1>

    <table border="1">
        <tr>
            <th>Date</th>
            <th>Start Time</th>
            <th>End Time</th>
            <th>Earnings (€)</th>
            <th>Kilometers</th>
        </tr>
        
        <tr th:each="shift : ${shifts}">
            <td th:text="${shift.shiftDate}"></td>
            <td th:text="${shift.startTime}"></td>
            <td th:text="${shift.endTime}"></td>
            <td th:text="${shift.grossEarnings}"></td>
            <td th:text="${shift.kilometersDriven}"></td>
        </tr>

        <a href="/addshift">Add a New Shift</a>
    </table>

</body>
</html>
