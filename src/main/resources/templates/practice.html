<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Study Mode</title>
    <meta charset="UTF-8">
    <style>
        /* The 3D Flip Magic */
        .scene {
            width: 400px;
            height: 250px;
            perspective: 1000px;
            margin: 40px auto;
            cursor: pointer;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        /* This class is added by JavaScript when you click */
        .card.is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .card-front {
            background-color: #ffffff;
            border: 2px solid #333;
        }
        .card-back {
            background-color: #f1f8e9;
            border: 2px solid #4caf50;
            transform: rotateY(180deg);
        }
        .controls {
            text-align: center;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 0 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments :: header}"></div>


    <div style="text-align: center; margin-top: 20px;">
        <h1>🔴 Intensive Practice Mode</h1>
        <a href="/decks">⬅ Back to Dashboard</a>
        <h3 id="progress-text">Card 1 of X</h3>
    </div>

    <div class="scene" onclick="flipCard()">
        <div class="card" id="flashcard">
            <div class="card-face card-front" id="card-front-text">Front</div>
            <div class="card-face card-back" id="card-back-text">Back</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard()">⬅ Previous</button>
        <button onclick="nextCard()">Next ➡</button>
    </div>

    <div class="controls" style="margin-top: 15px;">
        <button onclick="toggleFavorite()" id="fav-btn" style="background-color: #f1c40f; border: none; border-radius: 5px;">☆ Favorite</button>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const cards = /*[[${flashcards}]]*/ [];
        /*]]>*/
        
        let currentIndex = 0;
        const cardElement = document.getElementById('flashcard');
        const frontText = document.getElementById('card-front-text');
        const backText = document.getElementById('card-back-text');
        const progressText = document.getElementById('progress-text');

        // Function to load a card onto the screen
        function loadCard(index) {
            if (cards.length === 0) {
                frontText.innerText = "No cards in this deck!";
                backText.innerText = "Add some words first.";
                progressText.innerText = "0 of 0";
                return;
            }
            
            // Always show the front when loading a new card
            cardElement.classList.remove('is-flipped'); 
            
            // Small delay so the text doesn't change before the flip animation finishes
            setTimeout(() => {
                frontText.innerText = cards[index].frontText;
                backText.innerText = cards[index].backText;
                progressText.innerText = `Card ${index + 1} of ${cards.length}`;
            }, 150);
        }

        // The Flip Action
        function flipCard() {
            if (cards.length > 0) {
                cardElement.classList.toggle('is-flipped');
            }
        }

        // Next Button
        function nextCard() {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                loadCard(currentIndex);
            }
        }

        // Previous Button
        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                loadCard(currentIndex);
            }
        }

        function toggleFavorite() {
            if (cards.length === 0) return;
            let cardId = cards[currentIndex].id;
            
            // Call the database silently
            fetch('/api/toggle-favorite/' + cardId);
            
            // Update the button visually
            let btn = document.getElementById('fav-btn');
            if (btn.innerText === "☆ Favorite") {
                btn.innerText = "⭐ Favorited";
            } else {
                btn.innerText = "☆ Favorite";
            }
        }

        

        // Load the very first card when the page opens!
        window.onload = () => loadCard(0);
    </script>

</body>
</html>
