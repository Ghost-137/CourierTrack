
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add New Shift</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Log a New Delivery Shift</h1>

    <form th:action="@{/saveShift}" th:object="${shift}" method="post">
        
        <div>
            <label>Date:</label>
            <input type="date" th:field="*{shiftDate}" required />
        </div>
        <br>
        
        <div>
            <label>Start Time:</label>
            <input type="time" th:field="*{startTime}" required />
        </div>
        <br>
        
        <div>
            <label>End Time:</label>
            <input type="time" th:field="*{endTime}" required />
        </div>
        <br>
        
        <div>
            <label>Gross Earnings (€):</label>
            <input type="number" step="0.01" th:field="*{grossEarnings}" required />
        </div>
        <br>
        
        <div>
            <label>Kilometers Driven:</label>
            <input type="number" step="0.1" th:field="*{kilometersDriven}" required />
        </div>
        <br>
        
        <button type="submit">Save Shift</button>
    </form>

    <br>
    <a href="/shifts">Cancel and return to Dashboard</a>

</body>
</html>
